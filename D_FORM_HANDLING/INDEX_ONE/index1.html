<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Index page</title>
    <link rel='stylesheet' href='./index1.css'>
</head>
<body>
    <!-- selecting element -->
     <h1>selecting element</h1>
     <form action="" id="myform">
        <input type="text" id="username" placeholder="Enter name">
        <button type="submit">submit</button>
     </form>
     <!-- submit Event -->
      <h2>submit event</h2>
        <form action="" id="my-form">
        <input type="text" id="username" placeholder="Enter name">
        <button type="submit">submit</button>
        </form>
    <!-- Getting input value -->
        <h2>Getting input value</h2>
        <form id="table">
        <input type="text" id="usernames" placeholder="Enter name">
        <button type="submit">submit</button>
        </form>
    <!-- multiple inputs -->
     <h2>multiple inputs</h2>
     <form action="" class="forms">
        <input type="text" id="name" placeholder="enter user name"><br><br>
        <input type="text" id="email" placeholder="enter user email">
        <button type="submit">submit</button>
     </form>

    <!-- form validation -->
     <h2>form validation</h2>
      <form id="for">
        <input type="text" id="user" placeholder="Enter name">
        <button type="submit">submit</button>
        </form>
    
    <!-- Reset form -->
     <h2>Reset form</h2>
      <form id="id">
        <input type="text" id="enter" placeholder="Enter something">
        <button type="submit">submit</button>
        </form>

    <!-- Real time input handling -->
        <h2>Real time input handing</h2>
        <input type="text" id="box" placeholder="type here">
    <!-- Access form elements -->
     <h2>Access form elements</h2>
     <form action="" id="mysform">
        <input type="text" name="users" placeholder="input">
        <button type="submit">submit</button>
     </form>
     <!-- Mini task -->
      <h2>Mini task</h2>
      <form action="" id="formid">
        <input type="text" id="task" placeholder="Enter task">
        <button type="submit">Add</button>
      </form>
      <ul id="list"></ul>


<script src="../INDEX_ONE/index1.js"></script>
</body>
</html>
