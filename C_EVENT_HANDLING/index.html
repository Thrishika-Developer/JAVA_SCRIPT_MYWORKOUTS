<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Index page</title>
    <link rel='stylesheet' href='./index.css'>
</head>

<body>
    <!-- method1 -->
    <div class="button">
        <button id="btn">click me</button>
        <hr>
        <!-- event handing -->

        <label for="">Username</label>
        <input type="text" id="username">
    </div>
    <hr>
    <!-- attributes event handling -->
    <div class="button">
        <button id="btn" onclick="clickme()">clickme</button>
        <input type="text" id="username" onchange="changeEvent(event)">
    </div>
    <!-- ------------------------------------------------------------------------------------------ -->
    <!-- click event -->
    <h2>click event</h2>
    <button id="btn">click me</button>

    <!-- addEventListener -->
    <h2>addEventListener</h2>
    <button id="btns">click me</button>
    <!-- common Events - click -->
    <h2>click</h2>
    <button id="b">click me</button>
    <!-- input(typing) -->
     <h2>input typing</h2>
     <input type="text" id="input" placeholder="type something">
     <!-- submit(forms) -->
      <h2>submit forms</h2>
      <form action="" id="myform">
        <input type="text" id="inputs" placeholder="enter your name">
        <button type="submit">submit</button>
      </form>
    <!-- Mouse event -->
     <h2>Mouse event</h2>
     <div class="box">Hover me</div>

    <!-- event Object(event) -->
    <h2>event object(event)</h2>
    <button id="click">click me</button>

    <!-- old method -->
     <h2>old method</h2>
     <button id="button">click me</button>

     <!-- Multi event -->
    <h2>Multi event</h2>
    <button id="mul">click me</button>

    <!-- Event Delegation -->
     <!-- Event Delegation -->
     <ul id="list">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ul>
    <!-- Real example -->
     <h2>Real example</h2>
     <button id="clicked">click</button>
     <div id="texted">hello</div>


    <script src="./index.js"></script>
</body>

</html>
